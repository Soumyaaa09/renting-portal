<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DriveNow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style3d.css') }}">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">🚗</div>
        <div class="auth-title">DriveNow</div>
        <div class="auth-subtitle">Sign in to your account</div>
      </div>

      {% if message %}
      <div class="form-error">⚠ {{ message }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          Sign In →
        </button>
      </form>

      <div class="form-link">
        Don't have an account? <a href="/register">Create one</a>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='main3d.js') }}"></script>
</body>
</html>
