<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — DriveNow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style3d.css') }}">
  <style>
    .otp-input-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 24px 0;
    }
    .otp-box {
      width: 52px;
      height: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: var(--font-head);
      border: 2px solid var(--border);
      border-radius: 12px;
      background: rgba(30,20,10,0.03);
      color: var(--ink);
      outline: none;
      transition: all 0.25s ease;
      caret-color: var(--accent);
    }
    .otp-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,82,42,0.12);
      background: #fff;
    }
    .otp-box.filled {
      border-color: var(--accent);
      background: rgba(200,82,42,0.04);
    }

    .timer-ring {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--text2);
      font-weight: 500;
    }
    .timer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    .resend-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.3s;
      cursor: not-allowed;
    }
    .resend-link.active {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">📬</div>
        <div class="auth-title">Check your email</div>
        <div class="auth-subtitle">
          We sent a 6-digit code to<br>
          <strong style="color:var(--ink);">{{ email }}</strong>
        </div>
      </div>

      {% if message %}
      <div class="form-error">⚠ {{ message }}</div>
      {% endif %}

      <form method="POST" id="otp-form">
        <!-- Hidden field assembled by JS -->
        <input type="hidden" name="otp" id="otp-hidden">

        <div class="otp-input-row">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d0" autocomplete="one-time-code">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d5">
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="verify-btn" disabled>
          Verify & Sign In →
        </button>
      </form>

      <!-- Timer + resend -->
      <div style="text-align:center; margin-top:20px;">
        <div class="timer-ring" id="timer-display">
          <span class="timer-dot"></span>
          Code expires in <span id="timer-count" style="font-weight:700; color:var(--ink);">10:00</span>
        </div>
        <div style="margin-top:12px; font-size:0.88rem; color:var(--text2);">
          Didn't receive it?
          <a href="/resend-otp" class="resend-link" id="resend-btn">Resend code</a>
        </div>
      </div>

      <div class="form-link">
        <a href="/login" style="color:var(--text2); font-size:0.85rem;">← Use a different email</a>
      </div>

    </div>
  </div>

  {% include 'footer.html' %}

  <script src="{{ url_for('static', filename='main3d.js') }}"></script>
  <script>
    // ── OTP box auto-advance ────────────────────────────────
    const boxes  = Array.from(document.querySelectorAll('.otp-box'));
    const hidden = document.getElementById('otp-hidden');
    const btn    = document.getElementById('verify-btn');

    function getOtp() { return boxes.map(b => b.value).join(''); }

    function update() {
      const val = getOtp();
      hidden.value = val;
      btn.disabled = val.length < 6;
      boxes.forEach(b => b.classList.toggle('filled', b.value !== ''));
    }

    boxes.forEach((box, i) => {
      box.addEventListener('input', e => {
        const v = e.target.value.replace(/\D/g, '');
        e.target.value = v.slice(-1);
        if (v && i < 5) boxes[i + 1].focus();
        update();
      });

      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          boxes[i - 1].focus();
          boxes[i - 1].value = '';
          update();
        }
        if (e.key === 'ArrowLeft'  && i > 0) boxes[i - 1].focus();
        if (e.key === 'ArrowRight' && i < 5) boxes[i + 1].focus();
      });

      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        text.split('').slice(0, 6).forEach((ch, idx) => { if (boxes[idx]) boxes[idx].value = ch; });
        update();
        boxes[Math.min(text.length, 5)].focus();
      });
    });

    // Auto-submit when all 6 filled
    document.getElementById('otp-form').addEventListener('input', () => {
      if (getOtp().length === 6) setTimeout(() => document.getElementById('otp-form').submit(), 300);
    });

    // ── 10-min countdown ────────────────────────────────────
    let total = 600;
    const timerEl  = document.getElementById('timer-count');
    const resendEl = document.getElementById('resend-btn');

    const tick = setInterval(() => {
      total--;
      if (total <= 0) {
        clearInterval(tick);
        timerEl.textContent = '0:00';
        timerEl.style.color = 'var(--danger)';
        resendEl.classList.add('active');
        return;
      }
      const m = Math.floor(total / 60);
      const s = String(total % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
      if (total <= 60) {
        timerEl.style.color = 'var(--danger)';
        resendEl.classList.add('active');
      }
    }, 1000);

    // Focus first box
    boxes[0].focus();
  </script>
</body>
</html>
