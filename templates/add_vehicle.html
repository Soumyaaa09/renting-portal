<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Vehicle - DriveNow Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style3d.css') }}">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <nav class="navbar">
    <a href="/admin" class="navbar-brand">
      <div class="brand-icon">&#9881;</div>
      Drive<span>Now</span>
      <span style="font-size:0.6rem; color:#d97706; margin-left:6px; border:1px solid rgba(217,119,6,0.3); padding:2px 7px; border-radius:4px;">ADMIN</span>
    </a>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
    <div class="navbar-links" id="navbar-links">
      <a href="/admin">Dashboard</a>
      <a href="/admin/bookings">Bookings</a>
      <a href="/admin/vehicles">Fleet</a>
      <a href="/admin/add-vehicle">Add Vehicle</a>
      <a href="/logout" class="logout">Logout</a>
    </div>
  </nav>

  <div class="container add-vehicle-shell">
    <div class="add-vehicle-layout">

      <section class="add-vehicle-intro fade-up">
        <div class="section-label">Admin &rarr; Fleet</div>
        <h1 class="page-title">Add <span class="accent">Vehicle</span></h1>
        <p class="page-subtitle">Register a polished fleet listing with the details customers need before booking.</p>
      </section>

      <section class="add-vehicle-card card fade-up delay-1">
        <div class="form-heading">
          <div>
            <div class="section-label">Vehicle Details</div>
            <h2>Fleet Entry</h2>
          </div>
          <span class="form-chip">Admin</span>
        </div>

        <form method="POST" enctype="multipart/form-data" class="add-vehicle-form">

          <div class="form-group">
            <label class="form-label" for="vehicle-name">Vehicle Name</label>
            <input id="vehicle-name" class="form-input" type="text" name="name"
              placeholder="e.g. Honda City, Royal Enfield" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="vehicle-type">Vehicle Type</label>
              <select id="vehicle-type" class="form-input" name="type" required>
                <option value="">Select type</option>
                <option value="car">Car</option>
                <option value="bike">Bike</option>
                <option value="suv">SUV</option>
                <option value="van">Van</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="vehicle-price">Price per Hour (&#8377;)</label>
              <input id="vehicle-price" class="form-input" type="number" name="price"
                placeholder="250" min="1" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="vehicle-image">Vehicle Image <span>(optional)</span></label>
            <label class="file-drop" for="vehicle-image">
              <span class="file-drop-icon">+</span>
              <span>
                <strong>Upload vehicle photo</strong>
                <small>JPG, PNG or WEBP image</small>
              </span>
              <input id="vehicle-image" type="file" name="image_file" accept="image/*">
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add to Fleet &rarr;</button>
            <a href="/admin/vehicles" class="btn">Cancel</a>
          </div>

        </form>
      </section>

    </div>
  </div>

  {% include 'footer.html' %}

  <script src="{{ url_for('static', filename='main3d.js') }}"></script>
  <script>
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('navbar-links');
    toggle.addEventListener('click', () => { toggle.classList.toggle('open'); links.classList.toggle('open'); });
  </script>
</body>
</html>
