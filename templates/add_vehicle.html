<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Vehicle — DriveNow Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style3d.css') }}">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <nav class="navbar">
    <a href="/admin" class="navbar-brand">
      <div class="brand-icon">⚙️</div>
      Drive<span>Now</span>
      <span style="font-size:0.6rem; color:#d97706; margin-left:6px; border:1px solid rgba(217,119,6,0.3); padding:2px 7px; border-radius:4px;">ADMIN</span>
    </a>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
    <div class="navbar-links" id="navbar-links">
      <a href="/admin">Dashboard</a>
      <a href="/admin/bookings">Bookings</a>
      <a href="/admin/vehicles">Fleet</a>
      <a href="/admin/add-vehicle">Add Vehicle</a>
      <a href="/logout" class="logout">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:520px; margin:0 auto;">

      <div class="page-header fade-up">
        <div class="section-label">Admin → Fleet</div>
        <h1 class="page-title">Add <span class="accent">Vehicle</span></h1>
        <p class="page-subtitle">Register a new vehicle to make it available for booking.</p>
      </div>

      <div class="card fade-up delay-1" style="padding:36px;">
        <form method="POST" enctype="multipart/form-data">

          <div class="form-group">
            <label class="form-label">Vehicle Name</label>
            <input class="form-input" type="text" name="name"
              placeholder="e.g. Honda City, Royal Enfield…" required>
          </div>

          <div class="form-group">
            <label class="form-label">Vehicle Type</label>
            <select class="form-input" name="type" required>
              <option value="">Select type…</option>
              <option value="car">Car</option>
              <option value="bike">Bike</option>
              <option value="suv">SUV</option>
              <option value="van">Van</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Price per Hour (₹)</label>
            <input class="form-input" type="number" name="price"
              placeholder="e.g. 250" min="1" required>
          </div>

          <div class="form-group">
            <label class="form-label">Vehicle Image <span style="color:var(--text2); font-weight:400;">(optional)</span></label>
            <input class="form-input" type="file" name="image_file"
              accept="image/*" style="padding:10px;">
          </div>

          <div style="margin-top:8px; display:flex; gap:12px; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary">Add to Fleet →</button>
            <a href="/admin/vehicles" class="btn">Cancel</a>
          </div>

        </form>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='main3d.js') }}"></script>
  <script>
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('navbar-links');
    toggle.addEventListener('click', () => { toggle.classList.toggle('open'); links.classList.toggle('open'); });
  </script>
</body>
</html>
