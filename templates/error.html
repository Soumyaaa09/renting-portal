<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Server Error</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; padding: 40px; }
      .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; color: #c33; }
      p { line-height: 1.6; }
      .detail { margin-top: 1.5rem; background: #f8f8f8; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: Menlo, monospace; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Internal Server Error</h1>
      <p>Something went wrong while processing your request.</p>
      <div class="detail">{{ error_message }}</div>
    </div>
  </body>
</html>
